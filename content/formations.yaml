# Formation paths — first-class data per spec §6.1.
#
# A formation is a deterministic function of t ∈ [0, 1]. Given the wave
# start time and path duration, you know exactly where every enemy is
# at every tick. This is the mastery constraint: same input → same wave.
#
# Coordinate system: top-left origin, +y down. Playfield is 1280×720.
# Y-values may go negative (off-screen entry) or > 720 (off-screen exit).
#
# `type: catmull_rom` — smooth spline through control points.
# `duration` — seconds to traverse the path at speed_along_path = 1.
#              Actual time = duration / speed_multiplier where
#              speed_multiplier = enemy.speed_along_path / 100.
#
# `mirror(name)` is handled at parse time — mirrors x around centre line
# x=640 and reverses the curve handedness for symmetric-pair waves.

formations:
  # Stage 1 — gentle introduction
  arc_left_to_right:
    type: catmull_rom
    duration: 6.0
    control_points:
      - [-100, 80]
      - [ 200, 60]
      - [ 600, 140]
      - [1000, 60]
      - [1380, 80]

  # Slower vertical descent, used for the very first wave so the kid can
  # see what's happening.
  slow_descent_centre:
    type: catmull_rom
    duration: 7.0
    control_points:
      - [640, -80]
      - [640, 100]
      - [640, 280]
      - [640, 460]
      - [640, 800]

  # Stage 2 — pattern complication
  figure_eight_centre:
    type: catmull_rom
    duration: 9.0
    control_points:
      - [ 640, -80]
      - [ 320, 140]
      - [ 960, 320]
      - [ 320, 320]
      - [ 960, 140]
      - [ 640, 800]

  loop_left:
    type: catmull_rom
    duration: 7.5
    control_points:
      - [-100, 200]
      - [ 360, 240]
      - [ 520, 120]
      - [ 360, 360]
      - [ 220, 480]
      - [-100, 540]

  # Stage 3 — density up
  dive_then_strafe:
    type: catmull_rom
    duration: 5.5
    control_points:
      - [ 200, -80]
      - [ 220, 200]
      - [ 240, 380]
      - [ 600, 400]
      - [1000, 400]
      - [1380, 400]

  # Boss formations. Boss enters from off-screen top, settles into a
  # repeating loop. Phase 1 is a slow side-to-side; phase 2 tightens up.
  boss_phase_1:
    type: catmull_rom
    duration: 8.0
    loop: true                 # loops while phase active
    control_points:
      - [ 200, 160]
      - [ 640, 100]
      - [1080, 160]
      - [ 640, 220]
      - [ 200, 160]

  boss_phase_2:
    type: catmull_rom
    duration: 5.0
    loop: true
    control_points:
      - [ 320, 200]
      - [ 960, 120]
      - [ 960, 280]
      - [ 320, 280]
      - [ 320, 200]

  # ───────── Boss variety splines (fun review 2026-06-12 R4) ─────────
  # 20 instrumented playthroughs showed all five bosses flying the same
  # two loops (boss_phase_1 / boss_phase_2), so by L3 the kid has seen
  # every boss path the campaign owns. Three new looped paths below give
  # each boss its own flight signature. Looped catmull_rom paths do NOT
  # need a duplicated endpoint — path.py adds the wrap segment.

  # Corner-to-corner X dives. The boss lunges diagonally across the
  # arena and back, so the threat reads as "it is coming AT me" rather
  # than the side-to-side patrol the kid has memorised.
  boss_dive_cross:
    type: catmull_rom
    duration: 7.0
    loop: true
    control_points:
      - [ 240, 100]
      - [1040, 270]
      - [1040, 100]
      - [ 240, 270]

  # Low menacing float — a slow oval that dips into the top of the
  # kid's working zone (y ≈ 285). Pairs with full-circle weapons:
  # being LOW means ring/cross bullets reach the player fast, so the
  # path itself is the difficulty knob.
  boss_low_hover:
    type: catmull_rom
    duration: 6.0
    loop: true
    control_points:
      - [ 340, 240]
      - [ 640, 285]
      - [ 940, 240]
      - [ 640, 195]

  # Full-width figure-8 for the campaign finale. The repeated [640,160]
  # is the intentional double crossing — the spline passes through the
  # centre twice per loop, once per lobe, which is what makes it read
  # as a lemniscate instead of a wide oval.
  boss_lemniscate_wide:
    type: catmull_rom
    duration: 9.0
    loop: true
    control_points:
      - [ 640, 160]
      - [ 360,  90]
      - [ 180, 170]
      - [ 360, 250]
      - [ 640, 160]
      - [ 920,  90]
      - [1100, 170]
      - [ 920, 250]

  # Resupply-ship cruise. Enters from the top-left, gently arcs across
  # the upper third of the screen, and exits top-right. Stays well
  # above the player's working zone (y < 280) so collision is rare —
  # the ship is "passive transport" per kid playtest #8. Long duration
  # = slow speed; combined with `speed_along_path: 50` on the
  # resupply_ship enemy, the actual traversal is ~24 seconds wall-clock,
  # giving the player plenty of time to spot it and shoot.
  resupply_cruise:
    type: catmull_rom
    duration: 12.0
    control_points:
      - [-120, 120]
      - [ 200, 100]
      - [ 480, 160]
      - [ 800, 100]
      - [1080, 140]
      - [1400, 120]

  # ───────── Levels 3-5 formations ─────────
  # Three new paths added so the back-half of the campaign reads as
  # "harder versions of patterns I know" plus one genuinely new shape
  # per stage.

  # Steep diving line down the right gutter. Used by kamikaze runs —
  # reads as "incoming dive on your right" so the kid can pull left.
  kamikaze_dive_right:
    type: catmull_rom
    duration: 3.5
    control_points:
      - [1100, -80]
      - [1080, 120]
      - [1040, 360]
      - [ 960, 600]
      - [ 880, 820]

  # Wide horizontal sweep that traverses the upper-mid playfield twice
  # (out then back). Sentinels and gunships use this when paired so the
  # kid sees a "screen-wide patrol" they have to thread through.
  sweep_horizontal:
    type: catmull_rom
    duration: 10.0
    control_points:
      - [-100, 220]
      - [ 320, 200]
      - [ 720, 260]
      - [1080, 200]
      - [ 720, 280]
      - [ 320, 220]
      - [-100, 240]

  # Pincer entry from both top corners that converges toward centre-top
  # and then dives. Shape demands the kid sit dead-centre between two
  # incoming streams. Use mirror() if you want the symmetric pair to
  # cross the kid in a different rhythm.
  pincer_top:
    type: catmull_rom
    duration: 6.5
    control_points:
      - [ 100, -80]
      - [ 240, 120]
      - [ 440, 240]
      - [ 640, 320]
      - [ 640, 480]
      - [ 640, 800]

  # Marauder entry: dives in from above and SETTLES inside the upper
  # play zone (y ≈ 200) instead of crossing the screen. The free-roam
  # AI takes over at formation-end (kid playtest 2026-05-03 #10) so
  # the ship hovers + dodges instead of leaving. Loop=false; the
  # PendingFreeRoam → FreeRoamAI swap fires when t_norm hits 1.0.
  # Three control points enter at varying x so left/right deployments
  # can use mirror() to flip horizontal entry side.
  marauder_entry:
    type: catmull_rom
    duration: 4.5
    control_points:
      - [ 320, -100]
      - [ 360,   60]
      - [ 420,  140]
      - [ 460,  200]

  # ───────── Surprise waves (kid playtest 2026-05-03 #7) ─────────
  # "Enemies still do not really appear from the lower part of the
  # screen left or right or from near the player or behind." All three
  # of these formations enter from BELOW the playfield (y > 720) so the
  # kid sees them rise into view from their flank or directly behind
  # their ship rather than falling from above.

  # Rises from below-left, arcs up past the player's lower-left flank,
  # crosses the centre toward the upper-right, and exits top-right.
  from_below_left:
    type: catmull_rom
    duration: 5.5
    control_points:
      - [-80,  800]
      - [120,  680]
      - [320,  500]
      - [560,  280]
      - [880,  120]
      - [1200, -80]

  # Mirror of from_below_left — comes up the right flank.
  from_below_right:
    type: catmull_rom
    duration: 5.5
    control_points:
      - [1360, 800]
      - [1160, 680]
      - [960,  500]
      - [720,  280]
      - [400,  120]
      - [80,  -80]

  # Rises directly behind the player (centre-bottom), shoots up the
  # middle, then bows out to the upper-right so the kid has to twist
  # round to engage.
  from_behind_centre:
    type: catmull_rom
    duration: 4.0
    control_points:
      - [640,  850]
      - [620,  600]
      - [600,  360]
      - [580,  200]
      - [620,  100]
      - [800, -80]
