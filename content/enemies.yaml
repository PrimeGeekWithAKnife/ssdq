# Enemy definitions. Per spec §7.2.
#
# Note: `speed_along_path` (not generic velocity). Enemies follow a named
# formation from content/formations.yaml; speed is how fast they traverse
# the path, not a free vector. This enforces the mastery constraint at
# the data layer (§6.3, §6.4).
#
# Weapons fire on fixed beats along path-time (`fire_beats`), not in
# response to the player. An "aimed" shot is aimed at the player's
# position *at the moment of fire*, then travels in a straight line —
# the player's post-fire movement does not curve the bullet.

enemies:
  # NOTE on hitbox_radius: bumped from kid playtest 2026-04-27 — previously
  # set to ~30-50% of visual sprite size, which made enemies feel
  # "invulnerable" because bullets visibly grazing the sprite would miss
  # the hitbox. Now ~70% of visual, which matches shmup convention
  # (enemies forgiving, players tight).
  # Drop-pool note (kid playtest 2026-04-27): user requested initial
  # power-up set restricted to WEAPON BOOST and SPEED. Bomb / Health
  # are still defined and reachable on rare drops, but they're no
  # longer in the common pools so the kid sees the meaningful upgrades
  # first. Shield (10s forcefield invulnerability) added 2026-04-27 per
  # follow-up feedback — drops only from gunship / bomber so it feels
  # earned. Wingman / missile power-ups remain backlogged.
  # Task #9 drop-pool note (kid-playtest balance):
  #   bomb / shield / weapon_upgrade  ~30% combined  (frequent, useful)
  #   ship_speed / weapon_speed       ~30% combined  (mid)
  #   drone / missile                 ~20% combined  (rare-ish)
  #   extra_life                      ~5%            (very rare)
  # Drop pools are uniform-pick over a tuple, so weighting is done by
  # repetition — see _LIGHT_POOL / _HEAVY_POOL conceptually below.
  # Light enemies (drone/fighter) drop the friendlier subset — no
  # extra_life, no missile/drone (those need bomber/gunship to "earn").
  drone:
    sprite: enemies/drone.png
    hitbox_radius: 22         # was 14 — drone sprite ~50px
    hp: 1
    speed_along_path: 90
    weapon: null
    score: 100
    drop_chance: 0.10         # bumped a touch
    # Light pool — bomb/shield/weapon_upgrade common (3 each = 9/15),
    # ship_speed/weapon_speed mid (2 each = 4/15), missile rare (1/15),
    # rest (drone/extra_life) reserved for chunky enemies.
    drop_pool: [
      pickup_powerup, pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb, pickup_bomb,
      pickup_shield, pickup_shield, pickup_shield,
      pickup_ship_speed, pickup_ship_speed,
      pickup_weapon_speed, pickup_weapon_speed,
      pickup_missile,
      pickup_speed,
    ]

  fighter:
    sprite: enemies/fighter.png
    hitbox_radius: 26         # was 16
    hp: 3
    speed_along_path: 130
    weapon: aimed_shot
    fire_beats: [1.0, 2.2]      # path-time seconds at which to fire
    score: 250
    drop_chance: 0.20
    drop_pool: [
      pickup_powerup, pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb, pickup_bomb,
      pickup_shield, pickup_shield, pickup_shield,
      pickup_ship_speed, pickup_ship_speed,
      pickup_weapon_speed, pickup_weapon_speed,
      pickup_missile,
      pickup_speed,
    ]

  # Heavy pool: full 20-slot mix matching the kid-playtest weights.
  # bomb/shield/weapon_upgrade  = 4 each = 12/20  (~60% combined inside the pool)
  # ship_speed / weapon_speed   = 2 each =  4/20  (~20%)
  # drone / missile             = 1 each =  2/20  (~10%)
  # extra_life                  = 1     =      1/20 (~5%)
  # Plus 1 legacy pickup_speed slot to keep the existing speed-boost
  # flavour on the drop table.
  gunship:
    sprite: enemies/gunship.png
    hitbox_radius: 32         # was 22
    hp: 12
    speed_along_path: 60
    weapon: aimed_shot
    fire_beats: [1.4, 2.8, 4.2]
    score: 800
    drop_chance: 0.45
    drop_pool: [
      pickup_powerup, pickup_powerup, pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb, pickup_bomb, pickup_bomb,
      pickup_shield, pickup_shield, pickup_shield, pickup_shield,
      pickup_ship_speed, pickup_ship_speed,
      pickup_weapon_speed, pickup_weapon_speed,
      pickup_drone,
      pickup_missile,
      pickup_health,
      pickup_speed,
    ]

  bomber:
    sprite: enemies/bomber.png
    hitbox_radius: 38         # was 28
    hp: 8
    speed_along_path: 50
    weapon: spread_shot
    fire_beats: [2.0, 4.0]
    score: 600
    drop_chance: 0.40
    drop_pool: [
      pickup_powerup, pickup_powerup, pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb, pickup_bomb, pickup_bomb,
      pickup_shield, pickup_shield, pickup_shield, pickup_shield,
      pickup_ship_speed, pickup_ship_speed,
      pickup_weapon_speed, pickup_weapon_speed,
      pickup_drone,
      pickup_missile,
      pickup_health,
      pickup_speed,
    ]

  # Resupply ship — added 2026-04-27 from kid playtest #8:
  # "We need to see enemy resupply ships and if we hit those they drop
  #  the power-ups as well as the occasional random power up drop."
  #
  # Visually distinct (96x72 olive-green hull with two yellow supply
  # pods, rendered procedurally — see tools/gen_resupply_sprite.py).
  # Mechanically a fat target: 4x regular fighter HP, no weapon, slow
  # cruise across the top of the screen. 100% drop rate from the full
  # power-up pool so the kid is rewarded with a meaningful pickup
  # whenever they prioritise the kill.
  #
  # No `weapon` and no `fire_beats` — passive transport.
  # Path stays in the upper third (resupply_cruise formation) so the
  # ship rarely collides with the player; on the rare overlap, the
  # standard collision rules apply (hitbox is small relative to hull).
  resupply_ship:
    sprite: enemies/resupply_ship.png
    hitbox_radius: 36         # ~75% of visual half-width — forgiving target
    hp: 12                    # 4x fighter (3hp), 1.5x gunship (8hp), well below boss (60hp)
    speed_along_path: 50      # slow cruise — kid has time to spot and shoot
    weapon: null
    score: 1500               # bigger reward than gunship (800), still under boss
    drop_chance: 1.0          # 100% drop — guaranteed power-up
    drop_pool: [pickup_powerup, pickup_speed, pickup_bomb, pickup_health, pickup_shield]

# Boss definition. Phase inside the Level scene, not a separate scene
# (per spec §4.4). Two phases per spec §2 DOD #4.
bosses:
  boss_01:
    sprite: enemies/boss_01.png
    hitbox_radius: 60
    score: 10000
    intro_telegraph_seconds: 2.0
    phases:
      # Phase 1: predictable arc + slow tracking spiral. ~50% HP.
      # Was `spread_shot`. Switched to `slow_spiral` (kid playtest #8):
      # the new pattern keeps the same beat cadence but the bullets
      # actually trail the player slightly, which reads as a deliberate
      # threat the kid can dodge by drifting sideways. Beats kept on the
      # 1-second grid so the rhythm still feels learnable.
      - hp: 60
        formation: boss_phase_1
        weapon: slow_spiral
        fire_beats: [0.5, 1.5, 2.5, 3.5, 4.5]   # loops while phase active

      # Phase 2: burst-then-pause rhythm. Final 50% HP.
      # Was `aimed_triple`. Switched to `burst_then_pause`: beats are
      # now clustered into two short bursts per loop with a long
      # breather, instead of a steady stream. The fan is wide so the
      # kid has to actively reposition; the breather is the "OK now
      # I can move" beat. This is the variant rhythm we wanted on the
      # boss without the schema-breaking jump to a 3rd phase.
      - hp: 60
        formation: boss_phase_2
        weapon: burst_then_pause
        fire_beats: [0.2, 0.4, 0.6, 2.4, 2.6, 2.8]

  # Level-2 boss — deep-space phase. Visually distinct: red/orange recolour
  # of the boss_01 silhouette (procedurally tinted via PIL — see
  # tools/recolour notes in credits.toml). Mechanically harder:
  #   * 90 HP per phase (vs boss_01's 60) — 180 total.
  #   * Phase 1 keeps the slow_spiral pattern but on a tighter beat grid
  #     (every ~0.7s instead of every 1s) so the kid has less breathing
  #     room between dodges.
  #   * Phase 2 uses the new burst_then_pause cadence with a SHORTER
  #     pause and one extra beat per burst — the wall is denser but the
  #     gap is still readable. Stays inside the §6.3 mastery constraint
  #     (deterministic, fan/aimed_fan, no real-time tracking).
  boss_02:
    sprite: enemies/boss_02.png
    hitbox_radius: 60
    score: 18000
    intro_telegraph_seconds: 2.0
    phases:
      - hp: 90
        formation: boss_phase_1
        weapon: slow_spiral
        fire_beats: [0.4, 1.1, 1.8, 2.5, 3.2, 3.9, 4.6]

      - hp: 90
        formation: boss_phase_2
        weapon: burst_then_pause
        fire_beats: [0.1, 0.3, 0.5, 0.7, 1.8, 2.0, 2.2, 2.4]

# Enemy weapon definitions. Bullets are deterministic — see top-of-file note.
enemy_weapons:
  aimed_shot:
    sprite: projectiles/enemy_orb.png
    damage: 1                 # 1-hit-kill players (i-frames after respawn)
    speed: 280
    pattern: aimed             # at-time-of-fire snapshot
    bullets_per_beat: 1

  spread_shot:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 240
    pattern: fan
    bullets_per_beat: 5
    fan_arc_deg: 60            # spread across 60°, centred straight down

  aimed_triple:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 320
    pattern: aimed_fan
    bullets_per_beat: 3
    fan_arc_deg: 16            # tight 3-bullet spread aimed at player

  # Boss-pattern variants (kid playtest 2026-04-27, item #8).
  # All three obey the §6.3 mastery constraint: pattern is "aimed" or
  # "fan"/"aimed_fan", aim is a snapshot at moment of fire, no real-time
  # tracking. Variation comes from speed, bullet count, arc width and
  # the rhythm encoded in the boss phase's `fire_beats`, NOT from any
  # runtime adaptation.

  # Slow tracking 2-shot fan. Aimed at the player at moment of fire,
  # then the two bullets diverge slightly. Slow enough that the kid
  # can side-step it on first sight. Replaces spread_shot for boss_01
  # phase 1 (see boss block above).
  slow_spiral:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 180                 # noticeably slower than aimed_shot
    pattern: aimed_fan
    bullets_per_beat: 2
    fan_arc_deg: 24            # narrow split, reads as "tracking" not "wall"

  # Wide fan straight down. Used in BURSTS via boss phase fire_beats —
  # several beats clustered tight, then a long pause. The pattern itself
  # has no concept of "burst"; the burstiness lives in the beat schedule.
  # Replaces aimed_triple for boss_01 phase 2.
  burst_then_pause:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 220
    pattern: fan
    bullets_per_beat: 7
    fan_arc_deg: 90            # wide downward fan, demands repositioning

  # Full-circle ring. Fires a deterministic ring of bullets centred on
  # the firing enemy (boss). Telegraphs as a halo on the boss sprite.
  # Defined now as a content variant; not yet used on boss_01 because
  # the kid is 8 and a full ring on a first boss is mean. Reserved for
  # boss_02 or a hard-mode boss_01 phase.
  ring_shot:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 200
    pattern: fan
    bullets_per_beat: 8
    fan_arc_deg: 360           # full circle around the boss

# Pickups. Spec §2 DOD #5: weapon-up, speed-up, extra-bomb, extra-life.
# `pickup_health` IS the extra-life pickup (no separate hp system).
pickups:
  pickup_powerup:
    sprite: pickups/powerup.png
    hitbox_radius: 14
    fall_speed: 80
    effect: weapon_upgrade

  pickup_speed:
    sprite: pickups/speed.png
    hitbox_radius: 14
    fall_speed: 80
    effect: speed_up
    speed_multiplier: 1.25
    duration: 12.0             # seconds

  pickup_bomb:
    sprite: pickups/bomb.png
    hitbox_radius: 14
    fall_speed: 80
    effect: extra_bomb

  pickup_health:
    sprite: pickups/health.png
    hitbox_radius: 14
    fall_speed: 80
    effect: extra_life          # the 1-up

  # Shield: 10 seconds of total invulnerability via a forcefield ring.
  # Stacking refreshes the timer (does NOT add) — collecting two shields
  # back-to-back gives you 10 seconds, not 20. Drops from chunkier
  # enemies (gunship, bomber) so it feels earned, not handed out.
  pickup_shield:
    sprite: pickups/shield.png
    hitbox_radius: 14
    fall_speed: 80
    effect: shield
    duration: 10.0             # seconds — per user feedback

  # Task #9 — kid-playtest pool of 8 power-ups.
  # Permanent +15% ship-speed bump per pickup, capped at +60% (the
  # state layer enforces the cap so a flood of pickups can't make the
  # ship uncontrollable). Sprite: mint placeholder.
  pickup_ship_speed:
    sprite: pickups/ship_speed.png
    hitbox_radius: 14
    fall_speed: 80
    effect: ship_speed
    ship_speed_step: 0.15

  # 15-second rate-of-fire boost — divides the weapon cooldown by
  # `fire_rate_multiplier` while active. Refresh-on-pickup (matches
  # Shield / SpeedBoost stacking).
  pickup_weapon_speed:
    sprite: pickups/weapon_speed.png
    hitbox_radius: 14
    fall_speed: 80
    effect: weapon_speed
    fire_rate_multiplier: 1.5
    duration: 15.0

  # Drone pickup — inventory only. The level scene increments
  # AppState.drones_pending[slot]; the DRONE agent (future work)
  # owns the entity spawn pipeline.
  pickup_drone:
    sprite: pickups/drone.png
    hitbox_radius: 14
    fall_speed: 80
    effect: drone

  # Missile pickup — +3 missile charges per pickup. Inventory only.
  # AppState.missile_charges[slot] is read by the EQUIPPABLE agent
  # (future work).
  pickup_missile:
    sprite: pickups/missile.png
    hitbox_radius: 14
    fall_speed: 80
    effect: missile
    missile_count: 3
