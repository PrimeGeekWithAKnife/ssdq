# Enemy definitions. Per spec §7.2.
#
# Note: `speed_along_path` (not generic velocity). Enemies follow a named
# formation from content/formations.yaml; speed is how fast they traverse
# the path, not a free vector. This enforces the mastery constraint at
# the data layer (§6.3, §6.4).
#
# Weapons fire on fixed beats along path-time (`fire_beats`), not in
# response to the player. An "aimed" shot is aimed at the player's
# position *at the moment of fire*, then travels in a straight line —
# the player's post-fire movement does not curve the bullet.

enemies:
  # NOTE on hitbox_radius: bumped from kid playtest 2026-04-27 — previously
  # set to ~30-50% of visual sprite size, which made enemies feel
  # "invulnerable" because bullets visibly grazing the sprite would miss
  # the hitbox. Now ~70% of visual, which matches shmup convention
  # (enemies forgiving, players tight).
  # Drop-pool note (kid playtest 2026-04-27): user requested initial
  # power-up set restricted to WEAPON BOOST and SPEED. Bomb / Health
  # are still defined and reachable on rare drops, but they're no
  # longer in the common pools so the kid sees the meaningful upgrades
  # first. Shield (10s forcefield invulnerability) added 2026-04-27 per
  # follow-up feedback — drops only from gunship / bomber so it feels
  # earned. Wingman / missile power-ups remain backlogged.
  # Task #9 drop-pool note (kid-playtest balance):
  #   bomb / shield / weapon_upgrade  ~30% combined  (frequent, useful)
  #   ship_speed / weapon_speed       ~30% combined  (mid)
  #   drone / missile                 ~20% combined  (rare-ish)
  #   extra_life                      ~5%            (very rare)
  # Drop pools are uniform-pick over a tuple, so weighting is done by
  # repetition — see _LIGHT_POOL / _HEAVY_POOL conceptually below.
  # Light enemies (drone/fighter) drop the friendlier subset — no
  # extra_life, no missile/drone (those need bomber/gunship to "earn").
  drone:
    sprite: enemies/drone.png
    hitbox_radius: 22         # was 14 — drone sprite ~50px
    hp: 1
    speed_along_path: 90
    weapon: null
    score: 100
    drop_chance: 0.10         # bumped a touch
    # Light pool — bomb/shield/weapon_upgrade common (3 each = 9/15),
    # ship_speed/weapon_speed mid (2 each = 4/15), missile rare (1/15),
    # rest (drone/extra_life) reserved for chunky enemies.
    drop_pool: [
      pickup_powerup, pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb, pickup_bomb,
      pickup_shield, pickup_shield, pickup_shield,
      pickup_ship_speed, pickup_ship_speed,
      pickup_weapon_speed, pickup_weapon_speed,
      pickup_missile,
      pickup_speed,
    ]

  fighter:
    sprite: enemies/fighter.png
    hitbox_radius: 26         # was 16
    hp: 3
    speed_along_path: 130
    weapon: aimed_shot
    fire_beats: [1.0, 2.2]      # path-time seconds at which to fire
    score: 250
    drop_chance: 0.20
    drop_pool: [
      pickup_powerup, pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb, pickup_bomb,
      pickup_shield, pickup_shield, pickup_shield,
      pickup_ship_speed, pickup_ship_speed,
      pickup_weapon_speed, pickup_weapon_speed,
      pickup_missile,
      pickup_speed,
    ]

  # Heavy pool: full 20-slot mix matching the kid-playtest weights.
  # bomb/shield/weapon_upgrade  = 4 each = 12/20  (~60% combined inside the pool)
  # ship_speed / weapon_speed   = 2 each =  4/20  (~20%)
  # drone / missile             = 1 each =  2/20  (~10%)
  # extra_life                  = 1     =      1/20 (~5%)
  # Plus 1 legacy pickup_speed slot to keep the existing speed-boost
  # flavour on the drop table.
  gunship:
    sprite: enemies/gunship.png
    hitbox_radius: 32         # was 22
    hp: 12
    speed_along_path: 60
    weapon: aimed_shot
    fire_beats: [1.4, 2.8, 4.2]
    score: 800
    drop_chance: 0.45
    # Shield-on-first-hit (kid playtest 2026-05-03 #9 — "shielded
    # enemies should not activate before they are even being shot at").
    # Pre-2026-05-03 gunship had ``shield_on_spawn_seconds: 1.5`` which
    # popped a shield the kid couldn't engage with; switching to the
    # on-hit variant rewards the kid for shooting AT the enemy and
    # then teaches "now you wait for the shield to drop". Same 1.5s
    # absorption window; one-shot per spawn (no regenerating shields).
    shield_on_first_hit_seconds: 1.5
    drop_pool: [
      pickup_powerup, pickup_powerup, pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb, pickup_bomb, pickup_bomb,
      pickup_shield, pickup_shield, pickup_shield, pickup_shield,
      pickup_ship_speed, pickup_ship_speed,
      pickup_weapon_speed, pickup_weapon_speed,
      pickup_drone,
      pickup_missile,
      pickup_health,
      pickup_speed,
    ]

  bomber:
    sprite: enemies/bomber.png
    hitbox_radius: 38         # was 28
    hp: 8
    speed_along_path: 50
    weapon: spread_shot
    fire_beats: [2.0, 4.0]
    score: 600
    drop_chance: 0.40
    drop_pool: [
      pickup_powerup, pickup_powerup, pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb, pickup_bomb, pickup_bomb,
      pickup_shield, pickup_shield, pickup_shield, pickup_shield,
      pickup_ship_speed, pickup_ship_speed,
      pickup_weapon_speed, pickup_weapon_speed,
      pickup_drone,
      pickup_missile,
      pickup_health,
      pickup_speed,
    ]

  # Resupply ship — added 2026-04-27 from kid playtest #8:
  # "We need to see enemy resupply ships and if we hit those they drop
  #  the power-ups as well as the occasional random power up drop."
  #
  # Visually distinct (96x72 olive-green hull with two yellow supply
  # pods, rendered procedurally — see tools/gen_resupply_sprite.py).
  # Mechanically a fat target: 4x regular fighter HP, no weapon, slow
  # cruise across the top of the screen. 100% drop rate from the full
  # power-up pool so the kid is rewarded with a meaningful pickup
  # whenever they prioritise the kill.
  #
  # No `weapon` and no `fire_beats` — passive transport.
  # Path stays in the upper third (resupply_cruise formation) so the
  # ship rarely collides with the player; on the rare overlap, the
  # standard collision rules apply (hitbox is small relative to hull).
  resupply_ship:
    sprite: enemies/resupply_ship.png
    hitbox_radius: 36         # ~75% of visual half-width — forgiving target
    # HP doubled again (36 → 72) per kid playtest 2026-05-03 #1:
    # "Supply ships need to drop two power ups of some kind and need
    # to have double the armour." Still under the smallest boss phase
    # pool, so fight-vs-flight balance is intact.
    hp: 72                    # was 36 (was 12 originally); kid-playtest progressive
    # Speed bumped 50 → 100 per kid playtest 2026-05-02 #2: "needs to
    # be faster moving". Resupply_cruise duration is unchanged so the
    # ship crosses the screen in half the wall-clock time it used to.
    speed_along_path: 100     # was 50
    weapon: null
    score: 1500               # bigger reward than gunship (800), still under boss
    drop_chance: 1.0          # 100% drop — guaranteed power-up
    drop_pool: [pickup_powerup, pickup_speed, pickup_bomb, pickup_health, pickup_shield]
    # Guaranteed missile drop in addition to the random roll (kid
    # playtest 2026-05-03 #4 — "There needs to be more missile power
    # up drops. Likely ideal for a fixed supply ship drop + 1
    # random"). Net result: every supply ship pops 2 pickups — one
    # missile (always) and one drop_pool roll.
    guaranteed_drops: [pickup_missile]

  # ───────── Levels 3-5 introductions ─────────
  # New enemy palette to ramp difficulty across the back half of the
  # campaign. Each is mechanically distinct so the kid reads a new
  # threat type per level rather than a re-skin.

  # Level 3 introduction — fast harasser. Two HP, rapid 2-bullet aimed
  # bursts, brisker speed than fighter. Designed to populate the screen
  # in pairs along curved paths so the kid has to weave between fire
  # streams rather than parking under one fighter at a time.
  interceptor:
    sprite: enemies/interceptor.png
    hitbox_radius: 24         # slim profile, generous-but-honest box
    hp: 2
    speed_along_path: 170
    weapon: rapid_aim
    fire_beats: [0.6, 1.2, 1.8, 2.4]
    score: 350
    drop_chance: 0.18
    drop_pool: [
      pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb,
      pickup_shield, pickup_shield,
      pickup_ship_speed, pickup_ship_speed,
      pickup_weapon_speed, pickup_weapon_speed,
      pickup_missile,
      pickup_speed,
    ]

  # Level 4 introduction — kamikaze diver. No weapon, but extremely fast
  # along straight diving paths. The threat is body-collision, not bullets,
  # so the kid has to dodge the silhouette itself. 1 HP — easy to pop if
  # you see them coming, lethal if you don't.
  kamikaze:
    sprite: enemies/kamikaze.png
    hitbox_radius: 22
    hp: 1
    speed_along_path: 240     # fastest enemy in the game pre-boss
    weapon: null
    score: 200
    # 10% — the kid-playtest floor (test_resupply_ship.py guards this).
    # Kamikazes die in one shot so even a thin drop rate reads as "real
    # reward" when the kid picks them off the dive line.
    drop_chance: 0.10
    drop_pool: [
      pickup_powerup,
      pickup_bomb,
      pickup_ship_speed,
      pickup_weapon_speed,
      pickup_speed,
    ]
    # Kid playtest 2026-05-03 #8: kamikaze that misses on its dive
    # comes back and tries again until it kills the player or dies.
    passes_unlimited: true

  # Sentinel — heavy turret reworked into a free-roam mini-threat
  # (kid playtest 2026-05-03 #2: "they need to be smaller, move
  # faster, have double the armour they have now and need to have
  # shields (that activate only after first hit) they should persist
  # on the screen and move around until either the player is dead or
  # they are dead").
  # Pre-2026-05-03 it was a slow sweep_horizontal turret on L5 only.
  # Post-rework: 55×50 sprite (was 110×100), hp 30 (was 15), free-
  # roam at 130 px/s (faster than the marauder at 80 — lighter hull
  # by design), shield-on-first-hit so the kid sees the bubble pop
  # exactly when they engage. Persists until destroyed.
  sentinel:
    sprite: enemies/sentinel.png
    hitbox_radius: 22                    # was 36 — smaller hull
    hp: 30                                # was 15; doubled per #2
    speed_along_path: 130                 # entry-formation speed; free-roam uses its own
    weapon: twin_aim
    fire_beats: [1.0, 2.2, 3.4, 4.6]
    score: 1200
    drop_chance: 0.50
    drop_pool: [
      pickup_powerup, pickup_powerup, pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb, pickup_bomb, pickup_bomb,
      pickup_shield, pickup_shield, pickup_shield, pickup_shield,
      pickup_ship_speed, pickup_ship_speed,
      pickup_weapon_speed, pickup_weapon_speed,
      pickup_drone,
      pickup_missile,
      pickup_health,
      pickup_speed,
    ]
    shield_on_first_hit_seconds: 2.0      # bubble pops on first hit, lasts 2s
    free_roam:
      speed: 130                          # faster than marauder (80) — lighter hull
      dodge_aggression: 0.5
      zone: [60, 320]                     # upper play zone (slightly higher than marauder)

  # Mini-boss enemy (kid playtest 2026-05-03 #10). Enters via a short
  # entry formation, then transitions to FreeRoamAI — drifts inside
  # the upper play zone (y 80..320), dodges incoming player bullets,
  # and persists until destroyed. Twin-cannon rapid burst weapon
  # (`rapid_dual_line`) emulates the player's tier-2 feel rather than
  # the bright/slow alien orbs the kid associates with mooks. Heavy
  # armour (60 hp) takes a few hits — the kid registers it as a
  # standalone threat, not a swarm member.
  marauder:
    sprite: enemies/marauder.png
    hitbox_radius: 30
    hp: 60
    speed_along_path: 100     # entry formation speed; free-roam uses its own
    weapon: rapid_dual_line
    # 6 beats clustered into a tight burst, then the fire-loop period
    # (~max beat + 0.5 = 1.85s) gives a clear rearm gap.
    fire_beats: [0.0, 0.15, 0.3, 0.7, 0.85, 1.0]
    score: 3000
    drop_chance: 0.75         # mini-boss reward
    drop_pool: [
      pickup_powerup, pickup_powerup,
      pickup_bomb, pickup_bomb,
      pickup_missile,
      pickup_shield,
      pickup_health,
      pickup_weapon_speed,
    ]
    free_roam:
      speed: 80               # slower than sentinel by design (heavier hull)
      dodge_aggression: 0.4
      zone: [80, 320]         # upper play zone — kid still has space below

# Boss definition. Phase inside the Level scene, not a separate scene
# (per spec §4.4). Two phases per spec §2 DOD #4.
bosses:
  boss_01:
    sprite: enemies/boss_01.png
    hitbox_radius: 60
    score: 10000
    intro_telegraph_seconds: 2.0
    phases:
      # Phase 1: predictable arc + slow tracking spiral. ~50% HP.
      # Was `spread_shot`. Switched to `slow_spiral` (kid playtest #8):
      # the new pattern keeps the same beat cadence but the bullets
      # actually trail the player slightly, which reads as a deliberate
      # threat the kid can dodge by drifting sideways. Beats kept on the
      # 1-second grid so the rhythm still feels learnable.
      - hp: 180
        formation: boss_phase_1
        weapon: slow_spiral
        fire_beats: [0.5, 1.5, 2.5, 3.5, 4.5]   # loops while phase active

      # Phase 2: burst-then-pause rhythm. Final 50% HP.
      # Was `aimed_triple`. Switched to `burst_then_pause`: beats are
      # now clustered into two short bursts per loop with a long
      # breather, instead of a steady stream. The fan is wide so the
      # kid has to actively reposition; the breather is the "OK now
      # I can move" beat. This is the variant rhythm we wanted on the
      # boss without the schema-breaking jump to a 3rd phase.
      - hp: 180
        formation: boss_phase_2
        weapon: burst_then_pause
        fire_beats: [0.2, 0.4, 0.6, 2.4, 2.6, 2.8]

  # Level-2 boss — deep-space phase. Visually distinct: red/orange recolour
  # of the boss_01 silhouette (procedurally tinted via PIL — see
  # tools/recolour notes in credits.toml). Mechanically harder:
  #   * 90 HP per phase (vs boss_01's 60) — 180 total.
  #   * Phase 1 keeps the slow_spiral pattern but on a tighter beat grid
  #     (every ~0.7s instead of every 1s) so the kid has less breathing
  #     room between dodges.
  #   * Phase 2 uses the new burst_then_pause cadence with a SHORTER
  #     pause and one extra beat per burst — the wall is denser but the
  #     gap is still readable. Stays inside the §6.3 mastery constraint
  #     (deterministic, fan/aimed_fan, no real-time tracking).
  boss_02:
    sprite: enemies/boss_02.png
    hitbox_radius: 60
    score: 18000
    intro_telegraph_seconds: 2.0
    phases:
      - hp: 360
        formation: boss_phase_1
        weapon: slow_spiral
        fire_beats: [0.4, 1.1, 1.8, 2.5, 3.2, 3.9, 4.6]

      - hp: 360
        formation: boss_phase_2
        weapon: burst_then_pause
        fire_beats: [0.1, 0.3, 0.5, 0.7, 1.8, 2.0, 2.2, 2.4]


  # Level-3 boss "Tense Orbital" — finale of chapter 3, sits between
  # boss_02 (180 HP total) and the campaign-final boss_05 (~50000 score).
  # Visually re-uses the boss silhouette path (placeholder — SpriteAtlas
  # auto-fills missing files with a stable colour).
  #
  # Mechanical step from boss_02 (kid playtest 2026-04-28):
  #   * 110 HP per phase (vs boss_02's 90) — 220 total. Small bump so the
  #     fight is meaningfully longer without being a slog for an 8-year-old.
  #   * Phase 1 swaps slow_spiral for `aimed_triple` on a tight ~0.55s grid.
  #     The kid already knows the 3-bullet aimed fan from earlier enemies
  #     — boss_03 makes the difficulty step read as "wow it's faster"
  #     before the new attack arrives in phase 2. Familiar pattern,
  #     denser cadence — pure tempo bump on something the kid can read.
  #   * Phase 2 INTRODUCES `ring_shot` (full 360° ring of bullets). Beat
  #     grid is deliberately sparse — 3 fires across the 5s loop (~one
  #     ring every 1.6s) — so each ring telegraphs, expands, and the kid
  #     has time to spot a gap and slip through. A dense ring on a
  #     first-encounter boss would be mean; three big readable rings is
  #     the "wow new attack" beat we want here.
  #   * Stays inside the §6.3 mastery constraint: deterministic, no
  #     real-time tracking. All variation is beat density and weapon
  #     choice — same input → same fight.
  boss_03:
    sprite: enemies/boss_03.png
    hitbox_radius: 60
    score: 26000
    intro_telegraph_seconds: 2.0
    # Kid playtest 2026-05-02 #15 — "Level 3 boss needs to have a
    # temporary shield at 50% for 10 seconds". Phase 2 starts at the
    # 50% HP boundary; this opens a 10s forcefield window the moment
    # phase 2 begins so the kid sees the boss become invulnerable
    # before the new attack pattern fires.
    shield_on_phase_start_seconds: 10.0
    phases:
      # Phase 1: familiar aimed_triple at a tighter cadence. ~50% HP.
      # Beats sit roughly on a 0.55s grid across the 8s boss_phase_1
      # loop — the kid hears a steady drumbeat of tight 3-bullet fans
      # and learns to micro-dodge between volleys. No ring yet — just
      # "the same enemy fire I already know, but quicker". This is the
      # difficulty step boss_02 → boss_03 expressed purely as tempo.
      - hp: 540
        formation: boss_phase_1
        weapon: aimed_triple
        fire_beats: [0.4, 0.95, 1.5, 2.05, 2.6, 3.15, 3.7, 4.25]   # loops while phase active

      # Phase 2: NEW attack — full-circle ring_shot. Final 50% HP.
      # boss_phase_2 is a 5s loop; we fire the ring only 3 times per loop
      # (~every 1.6s) so each ring has room to expand and the kid has a
      # clear "spot the gap, slide through" beat between fires. Per the
      # ring_shot definition (8 bullets across 360°) the gaps are big
      # and readable. First time the kid sees this attack in the
      # campaign — keep it fair on the rhythm side.
      - hp: 540
        formation: boss_phase_2
        weapon: ring_shot
        fire_beats: [0.6, 2.2, 3.8]

  # Level-4 boss — "Over Earth" phase. Penultimate boss of the campaign,
  # NOT the finale. Slot in difficulty: harder than boss_03, but still
  # acts as a check before the level-5 final boss — the kid should beat
  # it in 2-3 attempts once they've cleared boss_03 cleanly.
  #
  # Visual: enemies/boss_04.png (placeholder — same silhouette family as
  # boss_01..03; the orchestrator will tint/recolour separately).
  #
  # Difficulty step (kid playtest 2026-04-28):
  #   * From boss_02 (the last burst_then_pause / spiral boss the kid has
  #     truly internalised): boss_04 keeps the SAME two weapon families
  #     the kid has now mastered (burst_then_pause and a ring pattern),
  #     so nothing about the SHAPE of the danger is new — what changes is
  #     density and gap width. No new mechanics to learn under pressure.
  #   * From boss_03 (the immediate predecessor — sparse rings + the
  #     spiral cadence): boss_04 tightens the ring schedule. Where
  #     boss_03 fired ONE ring per beat-cluster with generous spacing,
  #     boss_04 fires TWO rings per beat-cluster (paired beats 0.15s
  #     apart), so the dodge window between rings is roughly half. The
  #     burst_then_pause phase also gets one extra beat per cluster
  #     compared to boss_02 (4 beats per burst instead of 3-4).
  #
  # HP: 135 per phase × 2 phases = 270 total. Step up from boss_02 (180)
  # and a deliberately smaller HP step than boss_02 → boss_03 will be
  # (boss_03 is expected ~210-225); the LETHALITY does the heavy lifting
  # here, not the bullet-sponge. Two phases (not three) — three phases on
  # a penultimate boss risks fatiguing the kid before the finale, and a
  # clean two-act structure keeps the phase telegraph readable.
  #
  # Score: 35000 — sits between boss_03 (~25000-30000 expected) and the
  # eventual boss_05 finale.
  #
  # §6.3 mastery-constraint compliance:
  #   * Both weapons are pre-existing definitions (burst_then_pause is
  #     pattern=fan, ring_shot is pattern=fan with a 360° arc). Aim is
  #     either fixed-down or full-circle — no real-time tracking.
  #   * All variation lives in the deterministic fire_beats schedule.
  #   * Formations are the existing boss_phase_1 / boss_phase_2 (both
  #     loop:true) — no new movement primitives introduced.
  boss_04:
    sprite: enemies/boss_04.png
    hitbox_radius: 60
    score: 35000
    intro_telegraph_seconds: 2.0
    # Kid playtest 2026-05-02 #16 — "Level 4 & 5 bosses need a shield
    # for 10 seconds every 20 seconds of fighting." Cycle is
    # [vulnerable_secs, shielded_secs]; the boss starts vulnerable on
    # phase 1 and toggles on the cycle until death.
    shield_cycle_seconds: [20.0, 10.0]
    phases:
      # Phase 1 — "the wall". High-density burst_then_pause: TWO bursts
      # per loop, each burst is FOUR beats clustered ~0.15s apart, then a
      # long ~1.4s breather. Compared to boss_02 phase 2 (which was 4+4
      # beats but spaced 0.2s apart inside each burst), boss_04 packs the
      # beats tighter so the wall reads as a single sustained sheet of
      # fan-fire rather than a strobing pulse — but the breather is still
      # there as the kid's "OK, reposition now" signal.
      #
      # The fan_arc of burst_then_pause is 90° downward, so positioning
      # near the screen edges stays viable; the breather is when the kid
      # cuts back across the centre.
      - hp: 810
        formation: boss_phase_1
        weapon: burst_then_pause
        fire_beats: [0.10, 0.25, 0.40, 0.55, 1.95, 2.10, 2.25, 2.40]

      # Phase 2 — "the cage". ring_shot, but fired in PAIRS: each
      # beat-cluster is two rings ~0.15s apart, then a ~0.9s gap before
      # the next pair. Where boss_03 used sparse single rings (one ring
      # per beat with a long breath after), boss_04 doubles them up — the
      # second ring of each pair lands in the gap between the first
      # ring's bullets, so the effective dodge window between bullets is
      # roughly half. Kid still has the inter-pair breather to relocate.
      #
      # ring_shot is pattern=fan / fan_arc=360° / 8 bullets per beat, so
      # 8 bullets per ring × 2 rings per pair = 16 bullets per pair. The
      # offset firing makes the second ring's bullets appear in the gaps
      # of the first — deterministic, learnable, and the kid can still
      # find the weave once they've seen one full loop.
      - hp: 810
        formation: boss_phase_2
        weapon: ring_shot
        fire_beats: [0.20, 0.35, 1.40, 1.55, 2.60, 2.75, 3.80, 3.95]

  # Level-5 boss — THE CAMPAIGN-FINAL boss ("Hyperspace Final Push").
  # Kid playtest 2026-04-28: this is the last fight in the campaign, and
  # it's allowed to be the hardest thing in the game — but the kid arrives
  # here with the full earned kit (max-tier primary, drone companion,
  # missile charges, shield pickups), so "hardest" still means "beatable
  # by an 8-year-old who has played the run". No real-time tracking, no
  # adaptation — same mastery constraint as every other boss (§6.3).
  #
  # Visually: enemies/boss_05.png placeholder for now. A future tools/
  # recolour pass will give it the campaign-finale look (tinted gold +
  # heavier silhouette per the boss_02 recolour precedent).
  #
  # THREE phases — boss_01 / boss_02 only had two; the campaign finale
  # earns the extra phase. HP target ~150 per phase = ~450 total. That is
  # a serious wall but it is paced: phase 1 teaches the new weapon, phase
  # 2 is the wall-of-bullets crucible the kid already knows from boss_02
  # (just denser), phase 3 is the crescendo. Each phase reuses an
  # existing boss formation (boss_phase_1 / boss_phase_2 — both loop) so
  # we don't add a third spline; per loader.py, ≥1 phase is valid and 3
  # is fine.
  #
  # Weapons:
  #   * Phase 1 — heavy_spread (NEW level-5 wide downward fan, slower
  #     bullets — the kid has to dash side-to-side every beat). Mid
  #     density beat schedule. NOTE: heavy_spread itself lives in
  #     enemy_weapons: and will be added by the same content pass that
  #     integrates this block — referenced here by name only.
  #   * Phase 2 — burst_then_pause (existing). Tighter than boss_02:
  #     two clusters of 5 beats each per loop with the SHORTEST breather
  #     of any boss in the campaign (~0.6s gap). The "wall" phase.
  #   * Phase 3 — ring_shot (existing — defined but never used in the
  #     campaign until now). Three full rings per loop at boss tempo.
  #     Cyclic gaps mean the kid weaves between rings rather than
  #     dodging individual bullets — telegraphs the campaign-final
  #     crescendo.
  #
  # Score: 55000 — the biggest single reward in the campaign (boss_01
  # was 10000, boss_02 was 18000). The kid earned it.
  #
  # Mastery-constraint adherence: every weapon is fan / aimed_fan / fan
  # (the ring is just fan with arc=360). No tracking, no adaptation. The
  # difficulty lives in beat density and weapon stacking, NOT in any
  # runtime feedback loop. Same input → same fight, every run. Replay
  # determinism preserved.
  boss_05:
    sprite: enemies/boss_05.png
    hitbox_radius: 64                    # slightly chunkier than boss_01/02 (60) — finale silhouette
    score: 55000                         # campaign-final reward, dwarfs boss_02 (18000)
    intro_telegraph_seconds: 3.0         # extra beat of telegraph — kid needs to register "this is THE one"
    # Kid playtest 2026-05-04: "Level 5 boss far too easy. Needs to
    # start with a shield for 20 seconds. Then have a shield for 5
    # seconds every 10 seconds." The 20s opening window forces the
    # kid to dodge (shields are absorbed) before they can start
    # chipping HP. Cycle [10s vuln / 5s shielded] is tighter than
    # boss_04's [20/10] so phase-2 onwards is genuinely punishing.
    shield_initial_seconds: 20.0
    shield_cycle_seconds: [10.0, 5.0]
    # Homing-missile salvo (kid playtest 2026-05-03 #3 — final boss
    # gets player-style missiles "to ensure all those shields
    # collected earlier get used"). Two missiles every 4 seconds —
    # modest cadence, but heat-seeking, so the kid HAS to spend
    # shields/dodge instead of camping a corner.
    homing_missile_rate_seconds: 4.0
    homing_missile_salvo: 2
    phases:
      # Phase 1 — TEACH the new weapon. heavy_spread is a wide downward
      # fan with slower bullets; the kid learns the side-to-side dash
      # rhythm while HP is still fresh. Mid-density beat schedule on a
      # ~0.9s grid (5 beats over 4.5s of the 8s loop). Boss_phase_1 is
      # the slow side-to-side path so the boss itself is also moving —
      # the fan re-aims-by-position each beat without any tracking.
      - hp: 1620
        formation: boss_phase_1
        weapon: heavy_spread
        fire_beats: [0.6, 1.5, 2.4, 3.3, 4.2, 5.1, 6.0]

      # Phase 2 — THE WALL. burst_then_pause at tighter-than-boss_02
      # density. Two clusters of 5 beats per loop with a ~0.6s breather
      # (boss_02 had ~1.4s). Boss_phase_2 is the tight figure-8 path so
      # the boss itself shifts between bursts — the kid uses the
      # breather to reposition, then weathers the wall.
      - hp: 1620
        formation: boss_phase_2
        weapon: burst_then_pause
        fire_beats: [0.1, 0.3, 0.5, 0.7, 0.9, 1.5, 1.7, 1.9, 2.1, 2.3]

      # Phase 3 — CRESCENDO. ring_shot at boss tempo: three full rings
      # per loop, evenly spaced through the 8s boss_phase_1 loop. Cyclic
      # gaps in the ring (8 bullets, arc 360) form predictable wedges
      # the kid weaves through. This is the campaign's final test of
      # rhythmic dodging — and because the kit is maxed (drone aux fire,
      # missiles for chip damage, shield for the worst beat), the kid
      # has the answers if they kept their shields banked.
      - hp: 1620
        formation: boss_phase_1
        weapon: ring_shot
        fire_beats: [0.5, 3.2, 5.9]

# Enemy weapon definitions. Bullets are deterministic — see top-of-file note.
enemy_weapons:
  aimed_shot:
    sprite: projectiles/enemy_orb.png
    damage: 1                 # 1-hit-kill players (i-frames after respawn)
    speed: 280
    pattern: aimed             # at-time-of-fire snapshot
    bullets_per_beat: 1

  spread_shot:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 240
    pattern: fan
    bullets_per_beat: 5
    fan_arc_deg: 60            # spread across 60°, centred straight down

  aimed_triple:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 320
    pattern: aimed_fan
    bullets_per_beat: 3
    fan_arc_deg: 16            # tight 3-bullet spread aimed at player

  # Boss-pattern variants (kid playtest 2026-04-27, item #8).
  # All three obey the §6.3 mastery constraint: pattern is "aimed" or
  # "fan"/"aimed_fan", aim is a snapshot at moment of fire, no real-time
  # tracking. Variation comes from speed, bullet count, arc width and
  # the rhythm encoded in the boss phase's `fire_beats`, NOT from any
  # runtime adaptation.

  # Slow tracking 2-shot fan. Aimed at the player at moment of fire,
  # then the two bullets diverge slightly. Slow enough that the kid
  # can side-step it on first sight. Replaces spread_shot for boss_01
  # phase 1 (see boss block above).
  slow_spiral:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 180                 # noticeably slower than aimed_shot
    pattern: aimed_fan
    bullets_per_beat: 2
    fan_arc_deg: 24            # narrow split, reads as "tracking" not "wall"

  # Wide fan straight down. Used in BURSTS via boss phase fire_beats —
  # several beats clustered tight, then a long pause. The pattern itself
  # has no concept of "burst"; the burstiness lives in the beat schedule.
  # Replaces aimed_triple for boss_01 phase 2.
  burst_then_pause:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 220
    pattern: fan
    bullets_per_beat: 7
    fan_arc_deg: 90            # wide downward fan, demands repositioning

  # Full-circle ring. Fires a deterministic ring of bullets centred on
  # the firing enemy (boss). Telegraphs as a halo on the boss sprite.
  # Defined now as a content variant; not yet used on boss_01 because
  # the kid is 8 and a full ring on a first boss is mean. Reserved for
  # boss_02 or a hard-mode boss_01 phase.
  ring_shot:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 200
    pattern: fan
    bullets_per_beat: 8
    fan_arc_deg: 360           # full circle around the boss

  # ───────── Levels 3-5 weapon palette ─────────

  # Used by `interceptor` (level 3+). Quick 2-shot burst aimed at the
  # player at moment of fire — slightly faster bullets than `aimed_shot`
  # so the kid can't park in front of one and tank, but only 2 bullets
  # per beat so the screen doesn't fill with walls.
  rapid_aim:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 320
    pattern: aimed_fan
    bullets_per_beat: 2
    fan_arc_deg: 8             # tight pair — reads as a "twin shot"

  # Used by `sentinel` (level 5+). Wider 3-bullet aimed fan, slower
  # bullets so the kid has time to sidestep each beat. The combination
  # of slow bullets + wide spread + 4-beat cadence is the "turret" feel.
  twin_aim:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 220
    pattern: aimed_fan
    bullets_per_beat: 3
    fan_arc_deg: 28

  # Used by `marauder` (kid playtest 2026-05-03 #10). Two near-parallel
  # streams of fast bullets fired in tight clusters — the enemy
  # equivalent of the player's tier-2 weapon ("rapid like the level 2
  # player weapon"). 6 beats clustered ~0.15s apart for a clear "burst"
  # feel, then the fire-loop period gives a noticeable rearm gap so
  # the kid can read the rhythm and dodge between volleys.
  rapid_dual_line:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 360
    pattern: fan          # symmetric downward fan
    bullets_per_beat: 2
    fan_arc_deg: 6        # near-parallel — reads as twin streams

  # Used by boss_05 phase 1 — heavy spread that demands the kid commit
  # to one side of the screen for each beat. Wide downward fan, slower
  # bullets than burst_then_pause so the wall reads as "wait then dash"
  # rather than "panic".
  heavy_spread:
    sprite: projectiles/enemy_orb.png
    damage: 1
    speed: 200
    pattern: fan
    bullets_per_beat: 9
    fan_arc_deg: 110

# Pickups. Spec §2 DOD #5: weapon-up, speed-up, extra-bomb, extra-life.
# `pickup_health` IS the extra-life pickup (no separate hp system).
pickups:
  pickup_powerup:
    sprite: pickups/powerup.png
    hitbox_radius: 14
    fall_speed: 80
    effect: weapon_upgrade

  pickup_speed:
    sprite: pickups/speed.png
    hitbox_radius: 14
    fall_speed: 80
    effect: speed_up
    speed_multiplier: 1.25
    duration: 12.0             # seconds

  pickup_bomb:
    sprite: pickups/bomb.png
    hitbox_radius: 14
    fall_speed: 80
    effect: extra_bomb

  pickup_health:
    sprite: pickups/health.png
    hitbox_radius: 14
    fall_speed: 80
    effect: extra_life          # the 1-up

  # Shield: 10 seconds of total invulnerability via a forcefield ring.
  # Stacking refreshes the timer (does NOT add) — collecting two shields
  # back-to-back gives you 10 seconds, not 20. Drops from chunkier
  # enemies (gunship, bomber) so it feels earned, not handed out.
  pickup_shield:
    sprite: pickups/shield.png
    hitbox_radius: 14
    fall_speed: 80
    effect: shield
    duration: 10.0             # seconds — per user feedback

  # Task #9 — kid-playtest pool of 8 power-ups.
  # Permanent +15% ship-speed bump per pickup, capped at +60% (the
  # state layer enforces the cap so a flood of pickups can't make the
  # ship uncontrollable). Sprite: mint placeholder.
  pickup_ship_speed:
    sprite: pickups/ship_speed.png
    hitbox_radius: 14
    fall_speed: 80
    effect: ship_speed
    ship_speed_step: 0.15

  # 15-second rate-of-fire boost — divides the weapon cooldown by
  # `fire_rate_multiplier` while active. Refresh-on-pickup (matches
  # Shield / SpeedBoost stacking).
  pickup_weapon_speed:
    sprite: pickups/weapon_speed.png
    hitbox_radius: 14
    fall_speed: 80
    effect: weapon_speed
    fire_rate_multiplier: 1.5
    duration: 15.0

  # Drone pickup — inventory only. The level scene increments
  # AppState.drones_pending[slot]; the DRONE agent (future work)
  # owns the entity spawn pipeline.
  pickup_drone:
    sprite: pickups/drone.png
    hitbox_radius: 14
    fall_speed: 80
    effect: drone

  # Missile pickup — +3 missile charges per pickup. Inventory only.
  # AppState.missile_charges[slot] is read by the EQUIPPABLE agent
  # (future work).
  pickup_missile:
    sprite: pickups/missile.png
    hitbox_radius: 14
    fall_speed: 80
    effect: missile
    missile_count: 3
