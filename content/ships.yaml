# Player ship definitions. Per spec §7.1.
# Coordinates: top-left origin, +y down. Playfield is 1280×720.

ships:
  vanguard:
    sprite: ships/player_blue.png
    sprite_hit_flash: ships/player_blue_flash.png
    max_speed: 320          # pixels/sec
    accel: 1600             # pixels/sec²
    hitbox_radius: 8        # ~40% of visual sprite
    starting_lives: 3
    starting_bombs: 2
    respawn_invulnerability: 2.0   # seconds
    respawn_clearing_radius: 160   # pixels — cleared on respawn shockwave
    weapons:
      primary: pulse_lvl1
      bomb: shockwave

  # P2 ship: same stats, different sprite. (Single ship type for the slice
  # per §12; different colour is just visual.)
  vanguard_red:
    sprite: ships/player_red.png
    sprite_hit_flash: ships/player_red_flash.png
    max_speed: 320
    accel: 1600
    hitbox_radius: 8
    starting_lives: 3
    starting_bombs: 2
    respawn_invulnerability: 2.0
    respawn_clearing_radius: 160
    weapons:
      primary: pulse_lvl1
      bomb: shockwave

# Weapon definitions. Five-tier pulse tree. Each tier should change
# *kind* (twin / spread / tail / wide+tail / heavy), not just bullet
# count. Sprite colours walk cyan → magenta → orange so the kid can
# read his current tier without looking at the HUD. See
# docs/decisions/weapon-progression-research.md for the rationale.
weapons:
  # ─── Tier 1 — starter pellet ───────────────────────────────────────
  # Deliberately modest. Small pellet, slower fire rate (kid playtest
  # 2026-04-27: original lvl1 looked like an upgraded weapon already).
  # Untouched by the 5-tier rework.
  pulse_lvl1:
    type: bullet
    sprite: projectiles/pulse_basic.png
    damage: 1
    speed: 600
    fire_rate: 5.0          # shots/sec — gives upgrades headroom
    pattern: [{ angle_deg: 0, offset_x: 0, offset_y: -8 }]

  # ─── Tier 2 — Galaga twin-shot ────────────────────────────────────
  # Two parallel cyan beams — the "Dual Fighter" feel. Same straight
  # column as T1 but doubled, so the firing footprint *widens*
  # immediately on upgrade.
  pulse_lvl2:
    type: bullet
    sprite: projectiles/pulse_lvl2.png
    damage: 2
    speed: 660
    fire_rate: 7.0
    pattern:
      - { angle_deg: 0, offset_x: -8, offset_y: -8 }
      - { angle_deg: 0, offset_x:  8, offset_y: -8 }

  # ─── Tier 3 — Gradius "Double" ────────────────────────────────────
  # Twin core + two diagonal pellets opening the firing arc.
  # Sprite shifts cyan → magenta to signal the tier jump.
  pulse_lvl3:
    type: bullet
    sprite: projectiles/pulse_lvl3.png
    damage: 3
    speed: 700
    fire_rate: 9.0
    pattern:
      - { angle_deg:   0, offset_x:  -8, offset_y: -8 }
      - { angle_deg:   0, offset_x:   8, offset_y: -8 }
      - { angle_deg: -12, offset_x: -14, offset_y: -6 }
      - { angle_deg:  12, offset_x:  14, offset_y: -6 }

  # ─── Tier 4 — R-Type pod (front + tail) ───────────────────────────
  # Wider spread + tail shot for stragglers behind the player on
  # diagonal formations. Magenta-orange sprite — visibly hotter than T3.
  pulse_lvl4:
    type: bullet
    sprite: projectiles/pulse_lvl4.png
    damage: 4
    speed: 740
    fire_rate: 10.0
    pattern:
      - { angle_deg:   0, offset_x:  -8, offset_y: -10 }
      - { angle_deg:   0, offset_x:   8, offset_y: -10 }
      - { angle_deg: -16, offset_x: -16, offset_y:  -6 }
      - { angle_deg:  16, offset_x:  16, offset_y:  -6 }
      - { angle_deg: 180, offset_x:   0, offset_y:  10 }   # tail shot

  # ─── Tier 5 — superweapon ─────────────────────────────────────────
  # Heavy core beam, twin inner beams, twin wide diagonals, twin
  # tails. Largest sprite (white-hot orange with halo). Total = 7
  # bullets — the cap we set ourselves to keep readable. Damage leaps
  # 4 → 6 so end-game feels like a different weapon. Gunship (12 HP)
  # dies in 2 core hits; fighter (3 HP) dies in 1.
  pulse_lvl5:
    type: bullet
    sprite: projectiles/pulse_lvl5.png
    damage: 6
    speed: 780
    fire_rate: 12.0
    pattern:
      - { angle_deg:   0, offset_x:   0, offset_y: -14 }   # fat core
      - { angle_deg:   0, offset_x:  -8, offset_y: -10 }   # inner-L
      - { angle_deg:   0, offset_x:   8, offset_y: -10 }   # inner-R
      - { angle_deg: -18, offset_x: -18, offset_y:  -6 }   # outer-L
      - { angle_deg:  18, offset_x:  18, offset_y:  -6 }   # outer-R
      - { angle_deg: 165, offset_x:  -6, offset_y:  10 }   # tail-L
      - { angle_deg: 195, offset_x:   6, offset_y:  10 }   # tail-R

# Weapon-tree progression. Picking up a `pickup_powerup` advances by one
# level; cap at the highest tier; lost on death (back to base).
weapon_tree:
  pulse: [pulse_lvl1, pulse_lvl2, pulse_lvl3, pulse_lvl4, pulse_lvl5]

# Bomb definition. Spec §5 — 2 per life by default.
bombs:
  shockwave:
    sprite: projectiles/shockwave.png
    damage: 8                # one-shots most non-boss enemies
    radius: 360              # pixels — covers most of the playfield
    duration: 0.6            # seconds
    clears_bullets: true     # also wipes enemy fire on activation
