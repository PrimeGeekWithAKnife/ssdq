# Level 1 — "Outer Belt"
# Per spec §6.2. Wave stages → boss → boss death → game-complete.
# Definition-of-Done #3, #4: ≥ 3 wave stages, ≥ 4 enemy types, 1 boss with 2 phases.
#
# `at` is wall-clock seconds from level start.
# `spacing` is the gap (seconds) between successive enemies in the same
# wave following the same formation path.
# `delay` offsets a sub-wave's start within its `at:` block.
# `mirror(name)` reflects the formation about screen-centre x=640.
#
# `return_passes` (default 0) makes any survivor of a wave re-enter the
# formation that many extra times — deterministic, no RNG (spec §6.3).
#
# Pacing note (kid playtest 2026-04-27, item #10):
# Originally 11 waves across 3 stages → ~165s to boss. Re-pacing for the
# 8-year-old: 21 waves across 4 stages → ~210s to boss. The curve eases
# in much more gently (drones-only for the first 30s, single fighters
# before fighter pairs, single bomber preview before heavy combos) so
# the kid has time to read each new threat type before the next one
# stacks on top of it. Stage 4 is the new pre-boss crescendo; it
# layers heavies + symmetric strafe walls so the boss intro feels
# earned rather than arbitrary.

level: 1
title: "Outer Belt"
codename: outer_belt
music: music/level_01.ogg
boss_music: music/boss_01.ogg
background: bg_moon_surface
length_seconds: 225

waves:
  # ───────── Stage 1 — gentle introduction ─────────
  # NEW (kid playtest 2026-05-02 #6): two single fighters arrive BEFORE
  # the main drone swarm so the kid sees an actual fighting enemy
  # ("a couple of single enemies come to fight the players before the
  # main wave"). Slow_descent_centre is the easiest-to-read entry path
  # so the duel reads clearly before the screen fills up.
  - at: 1.0
    stage: 1
    spawn:
      - { enemy: fighter, count: 2, formation: slow_descent_centre, spacing: 1.4 }

  - at: 5.0
    stage: 1
    spawn:
      - { enemy: drone, count: 6, formation: arc_left_to_right, spacing: 0.4 }

  # Tiny mirror-peek so the kid sees the symmetry before the full mirror wave.
  - at: 11.0
    stage: 1
    spawn:
      - { enemy: drone, count: 3, formation: mirror(arc_left_to_right), spacing: 0.5 }

  - at: 17.0
    stage: 1
    spawn:
      - { enemy: drone, count: 6, formation: mirror(arc_left_to_right), spacing: 0.4 }

  # Wide-spaced straight line — easiest possible read, breather before stage 2.
  - at: 24.0
    stage: 1
    spawn:
      - { enemy: drone, count: 4, formation: slow_descent_centre, spacing: 0.8 }

  - at: 30.0
    stage: 1
    spawn:
      - { enemy: drone, count: 4, formation: slow_descent_centre, spacing: 0.6 }

  # ───────── Stage 2 — pattern complication ─────────
  # Survivors of these mid-level waves loop back for a second pass
  # (`return_passes: 1`) — rewards the kid who clears them on the first
  # pass and punishes the player who lets too many through.
  #
  # NEW: first armed enemy (fighter) appears solo and slow so the kid
  # learns "those things shoot back" before being asked to dodge a swarm.
  - at: 36.0
    stage: 2
    spawn:
      - { enemy: fighter, count: 3, formation: arc_left_to_right, spacing: 0.5 }

  - at: 44.0
    stage: 2
    spawn:
      - { enemy: drone, count: 8, formation: figure_eight_centre, spacing: 0.3, return_passes: 1 }

  # NEW: light fighter+drone pair, well-delayed, to teach "watch both lanes".
  - at: 54.0
    stage: 2
    spawn:
      - { enemy: fighter, count: 4, formation: mirror(arc_left_to_right), spacing: 0.4 }
      - { enemy: drone, count: 5, formation: slow_descent_centre, spacing: 0.6, delay: 1.5 }

  - at: 64.0
    stage: 2
    spawn:
      - { enemy: fighter, count: 3, formation: loop_left, spacing: 0.8, return_passes: 1 }
      - { enemy: fighter, count: 3, formation: mirror(loop_left), spacing: 0.8, delay: 1.5, return_passes: 1 }

  # NEW (kid playtest 2026-05-02 #3): rapid-fire interceptor preview so
  # the kid sees the rapid_aim weapon early in level 1 ("yet to spot a
  # single enemy with rapid fire"). Two interceptors, well-spaced, on
  # the same arc as fighters so the kid reads them as "fighter but
  # faster + shoots more." Tightens the previously 12s gap to 8s.
  - at: 72.0
    stage: 2
    spawn:
      - { enemy: interceptor, count: 2, formation: arc_left_to_right, spacing: 0.7 }

  # Bomber preview — only 2, very wide spacing, so the spread_shot is a
  # "look at that pattern" moment, not a wall of bullets.
  - at: 78.0
    stage: 2
    spawn:
      - { enemy: bomber, count: 2, formation: slow_descent_centre, spacing: 1.5 }

  - at: 84.0
    stage: 2
    spawn:
      - { enemy: fighter, count: 6, formation: arc_left_to_right, spacing: 0.35, return_passes: 1 }
      - { enemy: fighter, count: 6, formation: mirror(arc_left_to_right), spacing: 0.35, delay: 0.8, return_passes: 1 }

  # Resupply ship #1 — kid playtest #8. Crosses the top of the screen
  # during a quiet beat so the kid can prioritise it. 100% power-up drop.
  - at: 91.0
    stage: 2
    spawn:
      - { enemy: resupply_ship, count: 1, formation: resupply_cruise, spacing: 0.0 }

  # ───────── Stage 3 — density up ─────────
  # Pacing pass kid playtest 2026-05-02 #8 — every authored gap now
  # ≤ 10 seconds. Previously 124→138 was 14s and 144→158 was 14s.
  - at: 100.0
    stage: 3
    spawn:
      - { enemy: drone, count: 8, formation: figure_eight_centre, spacing: 0.25 }
      - { enemy: fighter, count: 4, formation: dive_then_strafe, spacing: 0.5, delay: 1.0 }

  - at: 108.0
    stage: 3
    spawn:
      - { enemy: fighter, count: 12, formation: dive_then_strafe, spacing: 0.25 }

  # Flank wave — fighters from the left while drones arc overhead.
  - at: 116.0
    stage: 3
    spawn:
      - { enemy: fighter, count: 2, formation: loop_left, spacing: 1.0 }
      - { enemy: drone, count: 6, formation: arc_left_to_right, spacing: 0.3, delay: 0.5 }

  - at: 124.0
    stage: 3
    spawn:
      - { enemy: bomber, count: 4, formation: slow_descent_centre, spacing: 1.2 }
      - { enemy: drone, count: 10, formation: figure_eight_centre, spacing: 0.2, delay: 0.5 }

  # Mirror-strafe pressure — gap was 14s; now 9s.
  - at: 133.0
    stage: 3
    spawn:
      - { enemy: fighter, count: 6, formation: mirror(dive_then_strafe), spacing: 0.3 }

  - at: 140.0
    stage: 3
    spawn:
      - { enemy: fighter, count: 2, formation: loop_left, spacing: 1.0 }
      - { enemy: fighter, count: 2, formation: mirror(loop_left), spacing: 1.0, delay: 0.5 }
      - { enemy: fighter, count: 8, formation: dive_then_strafe, spacing: 0.3, delay: 2.0 }

  # Mid-stage 3 interceptor wave — second taste of rapid fire.
  - at: 148.0
    stage: 3
    spawn:
      - { enemy: interceptor, count: 3, formation: dive_then_strafe, spacing: 0.5 }

  # ───────── Stage 4 — pre-boss crescendo ─────────
  - at: 156.0
    stage: 4
    spawn:
      - { enemy: bomber, count: 3, formation: slow_descent_centre, spacing: 1.0 }
      - { enemy: fighter, count: 2, formation: mirror(loop_left), spacing: 0.9, delay: 1.0 }

  - at: 163.0
    stage: 4
    spawn:
      - { enemy: resupply_ship, count: 1, formation: resupply_cruise, spacing: 0.0 }

  - at: 170.0
    stage: 4
    spawn:
      - { enemy: fighter, count: 8, formation: dive_then_strafe, spacing: 0.25 }
      - { enemy: fighter, count: 8, formation: mirror(dive_then_strafe), spacing: 0.25, delay: 0.5 }

  # Tightened: was 188 (16s gap), now 178 (8s).
  - at: 178.0
    stage: 4
    spawn:
      - { enemy: interceptor, count: 2, formation: mirror(arc_left_to_right), spacing: 0.6 }
      - { enemy: drone, count: 6, formation: arc_left_to_right, spacing: 0.3, delay: 0.6 }

  # Final crescendo — fighter pincer + drone figure-eight overlay.
  - at: 186.0
    stage: 4
    spawn:
      - { enemy: fighter, count: 2, formation: loop_left, spacing: 0.8 }
      - { enemy: fighter, count: 2, formation: mirror(loop_left), spacing: 0.8, delay: 0.4 }
      - { enemy: drone, count: 8, formation: figure_eight_centre, spacing: 0.2, delay: 1.5 }

  # ───────── Boss ─────────
  # Pulled in from 210 → 196 (was 22s after final wave; now 10s) so the
  # pre-boss lull doesn't break kid playtest #8 ("no more than 5-10s
  # between waves").
  - at: 196.0
    stage: boss
    boss: boss_01
