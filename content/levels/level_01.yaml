# Level 1 — "Outer Belt"
# Per spec §6.2. Three wave stages → boss → boss death → game-complete.
# Definition-of-Done #3, #4: 3 wave stages, ≥ 4 enemy types, 1 boss with 2 phases.
#
# `at` is wall-clock seconds from level start.
# `spacing` is the gap (seconds) between successive enemies in the same
# wave following the same formation path.
# `delay` offsets a sub-wave's start within its `at:` block.
# `mirror(name)` reflects the formation about screen-centre x=640.
# `return_passes` (default 0) makes any survivor of a wave re-enter the
# formation that many extra times — deterministic, no RNG (spec §6.3).

level: 1
title: "Outer Belt"
codename: outer_belt
music: music/level_01.ogg
boss_music: music/boss_01.ogg
background: bg_starfield_01
length_seconds: 180

waves:
  # ───────── Stage 1 — gentle introduction ─────────
  - at: 2.0
    stage: 1
    spawn:
      - { enemy: drone, count: 6, formation: arc_left_to_right, spacing: 0.4 }

  - at: 14.0
    stage: 1
    spawn:
      - { enemy: drone, count: 6, formation: mirror(arc_left_to_right), spacing: 0.4 }

  - at: 28.0
    stage: 1
    spawn:
      - { enemy: drone, count: 4, formation: slow_descent_centre, spacing: 0.6 }

  # ───────── Stage 2 — pattern complication ─────────
  # Survivors of these mid-level waves loop back for a second pass —
  # rewards the kid playtester who clears the wave the first time and
  # punishes the player who lets too many through (2026-04-27).
  - at: 44.0
    stage: 2
    spawn:
      - { enemy: drone, count: 8, formation: figure_eight_centre, spacing: 0.3, return_passes: 1 }

  - at: 64.0
    stage: 2
    spawn:
      - { enemy: gunship, count: 3, formation: loop_left, spacing: 0.8, return_passes: 1 }
      - { enemy: gunship, count: 3, formation: mirror(loop_left), spacing: 0.8, delay: 1.5, return_passes: 1 }

  - at: 84.0
    stage: 2
    spawn:
      - { enemy: fighter, count: 6, formation: arc_left_to_right, spacing: 0.35, return_passes: 1 }
      - { enemy: fighter, count: 6, formation: mirror(arc_left_to_right), spacing: 0.35, delay: 0.8, return_passes: 1 }

  # ───────── Stage 3 — density up ─────────
  - at: 108.0
    stage: 3
    spawn:
      - { enemy: fighter, count: 12, formation: dive_then_strafe, spacing: 0.25 }

  - at: 124.0
    stage: 3
    spawn:
      - { enemy: bomber, count: 4, formation: slow_descent_centre, spacing: 1.2 }
      - { enemy: drone, count: 10, formation: figure_eight_centre, spacing: 0.2, delay: 0.5 }

  - at: 144.0
    stage: 3
    spawn:
      - { enemy: gunship, count: 2, formation: loop_left, spacing: 1.0 }
      - { enemy: gunship, count: 2, formation: mirror(loop_left), spacing: 1.0, delay: 0.5 }
      - { enemy: fighter, count: 8, formation: dive_then_strafe, spacing: 0.3, delay: 2.0 }

  # ───────── Boss ─────────
  - at: 165.0
    stage: boss
    boss: boss_01
