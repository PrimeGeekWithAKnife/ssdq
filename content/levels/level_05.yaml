# Level 5 — "Hyperspace Final Push"
# Campaign finale (multi-level arc, 2026-04-25-ssdq-design.md). The aliens
# have massed their entire hyperspace fleet for one last assault before
# Earth orbit. Maximum density — every threat type the kid has learned
# across levels 1-4 stacks here, and the brand-new `sentinel` debuts as
# the late-wave anchor.
#
# Music: music/level_05.ogg (fast, layered, climbing — see
# tools/generate_music.py LEVEL_05 spec). Boss music: music/boss_05.ogg.
# Background: bg_starfield_01 (deep-space backdrop reused).
#
# Length: 265 seconds — the longest level. Pacing keeps the kid on the
# back foot but never overwhelmed: stage 1 opens straight into mid-tier
# combos (no drone-only ramp — by now they know what they're doing),
# stage 2 introduces the sentinel as a SOLO preview so the kid can read
# the wide twin-aim fan, stage 3 starts pairing sentinels with everything
# else, and stage 4 is the "everything you've learned, all at once"
# crescendo — 4+ enemy types per wave, sentinels anchoring while
# interceptors flit and bombers wall and kamikazes dive.
#
# Sentinel design note (kid playtest target): hp=15, slow, twin-aim
# wide fan. The kid has to COMMIT to killing one — peeling off mid-kill
# means the fan keeps tracking. Drop one or two and the rest of the
# wave flows around them. This is the level's signature pressure.
#
# Resupply ships: TWO drops — one mid-level (~stage 2 close) and one
# pre-boss (~stage 4 mid) — the kid will burn ammo and bombs against
# the sentinel walls and needs the top-up before boss_05.

level: 5
title: "Hyperspace Final Push"
codename: hyperspace_final_push
music: music/level_05.ogg
boss_music: music/boss_05.ogg
background: bg_starfield_01
length_seconds: 265

waves:
  # Pacing pass kid playtest 2026-05-02 #8 — every authored gap ≤ 10s.
  # Stage 1 — straight into the fight.
  - at: 2.0
    stage: 1
    spawn:
      - { enemy: fighter, count: 6, formation: arc_left_to_right, spacing: 0.35 }
      - { enemy: fighter, count: 6, formation: mirror(arc_left_to_right), spacing: 0.35, delay: 0.8 }

  - at: 12.0
    stage: 1
    spawn:
      - { enemy: interceptor, count: 4, formation: dive_then_strafe, spacing: 0.3 }
      - { enemy: drone, count: 8, formation: figure_eight_centre, spacing: 0.25, delay: 1.0 }

  - at: 22.0
    stage: 1
    spawn:
      - { enemy: gunship, count: 3, formation: loop_left, spacing: 0.7, return_passes: 1 }
      - { enemy: gunship, count: 3, formation: mirror(loop_left), spacing: 0.7, delay: 0.8, return_passes: 1 }

  - at: 32.0
    stage: 1
    spawn:
      - { enemy: bomber, count: 3, formation: slow_descent_centre, spacing: 1.0 }
      - { enemy: interceptor, count: 5, formation: pincer_top, spacing: 0.3, delay: 1.2 }

  - at: 42.0
    stage: 1
    spawn:
      - { enemy: kamikaze, count: 4, formation: kamikaze_dive_right, spacing: 0.5 }
      - { enemy: kamikaze, count: 4, formation: mirror(kamikaze_dive_right), spacing: 0.5, delay: 0.6 }

  - at: 50.0
    stage: 1
    spawn:
      - { enemy: gunship, count: 2, formation: mirror(loop_left), spacing: 0.8 }
      - { enemy: interceptor, count: 5, formation: pincer_top, spacing: 0.3, delay: 1.0 }

  # Surprise wave #1 of 3 (kid playtest 2026-05-03 #7) — kamikazes
  # rise up the left flank.
  - at: 56.0
    stage: 1
    spawn:
      - { enemy: kamikaze, count: 5, formation: from_below_left, spacing: 0.35 }

  # Stage 2 — sentinel debuts.
  - at: 60.0
    stage: 2
    spawn:
      - { enemy: sentinel, count: 1, formation: sweep_horizontal, spacing: 0.0 }
      - { enemy: drone, count: 8, formation: figure_eight_centre, spacing: 0.25, delay: 1.0 }

  - at: 70.0
    stage: 2
    spawn:
      - { enemy: fighter, count: 8, formation: dive_then_strafe, spacing: 0.25 }
      - { enemy: fighter, count: 8, formation: mirror(dive_then_strafe), spacing: 0.25, delay: 0.4 }

  - at: 80.0
    stage: 2
    spawn:
      - { enemy: bomber, count: 4, formation: slow_descent_centre, spacing: 0.9 }
      - { enemy: interceptor, count: 4, formation: pincer_top, spacing: 0.3, delay: 1.0 }
      - { enemy: drone, count: 6, formation: figure_eight_centre, spacing: 0.3, delay: 2.0 }

  - at: 90.0
    stage: 2
    spawn:
      - { enemy: sentinel, count: 1, formation: sweep_horizontal, spacing: 0.0 }
      - { enemy: sentinel, count: 1, formation: mirror(sweep_horizontal), spacing: 0.0, delay: 1.0 }
      - { enemy: gunship, count: 2, formation: loop_left, spacing: 0.9, delay: 2.0 }

  - at: 100.0
    stage: 2
    spawn:
      - { enemy: resupply_ship, count: 1, formation: resupply_cruise, spacing: 0.0 }

  # Stage 3 — the stack tightens.
  - at: 108.0
    stage: 3
    spawn:
      - { enemy: kamikaze, count: 5, formation: kamikaze_dive_right, spacing: 0.4 }
      - { enemy: kamikaze, count: 5, formation: mirror(kamikaze_dive_right), spacing: 0.4, delay: 0.6 }
      - { enemy: drone, count: 6, formation: figure_eight_centre, spacing: 0.3, delay: 1.5 }

  - at: 118.0
    stage: 3
    spawn:
      - { enemy: interceptor, count: 6, formation: pincer_top, spacing: 0.25 }
      - { enemy: fighter, count: 6, formation: dive_then_strafe, spacing: 0.3, delay: 1.0 }

  # Marauder squadron #1 (of 2) — kid playtest 2026-05-03 #10. Three
  # ships enter staggered then free-roam in the upper play zone.
  - at: 126.0
    stage: 3
    spawn:
      - { enemy: marauder, count: 1, formation: marauder_entry, spacing: 0.0 }
      - { enemy: marauder, count: 1, formation: mirror(marauder_entry), spacing: 0.0, delay: 0.6 }
      - { enemy: marauder, count: 1, formation: marauder_entry, spacing: 0.0, delay: 1.2 }

  - at: 128.0
    stage: 3
    spawn:
      - { enemy: sentinel, count: 2, formation: sweep_horizontal, spacing: 1.5 }
      - { enemy: bomber, count: 3, formation: slow_descent_centre, spacing: 1.0, delay: 1.5 }

  - at: 138.0
    stage: 3
    spawn:
      - { enemy: gunship, count: 3, formation: loop_left, spacing: 0.7, return_passes: 1 }
      - { enemy: gunship, count: 3, formation: mirror(loop_left), spacing: 0.7, delay: 0.5, return_passes: 1 }

  # Surprise wave #2 of 3 — interceptors come up the right flank.
  - at: 144.0
    stage: 3
    spawn:
      - { enemy: interceptor, count: 4, formation: from_below_right, spacing: 0.4 }
      - { enemy: drone, count: 8, formation: figure_eight_centre, spacing: 0.2, delay: 1.5 }

  - at: 148.0
    stage: 3
    spawn:
      - { enemy: fighter, count: 6, formation: arc_left_to_right, spacing: 0.3, return_passes: 1 }
      - { enemy: fighter, count: 6, formation: mirror(arc_left_to_right), spacing: 0.3, delay: 0.5, return_passes: 1 }
      - { enemy: bomber, count: 2, formation: slow_descent_centre, spacing: 1.2, delay: 1.5 }

  # Stage 4 — everything, all at once.
  - at: 158.0
    stage: 4
    spawn:
      - { enemy: sentinel, count: 1, formation: sweep_horizontal, spacing: 0.0 }
      - { enemy: bomber, count: 3, formation: slow_descent_centre, spacing: 1.0, delay: 1.0 }
      - { enemy: interceptor, count: 4, formation: pincer_top, spacing: 0.3, delay: 1.5 }
      - { enemy: kamikaze, count: 3, formation: kamikaze_dive_right, spacing: 0.5, delay: 2.5 }

  - at: 168.0
    stage: 4
    spawn:
      - { enemy: resupply_ship, count: 1, formation: resupply_cruise, spacing: 0.0 }

  - at: 176.0
    stage: 4
    spawn:
      - { enemy: sentinel, count: 1, formation: mirror(sweep_horizontal), spacing: 0.0 }
      - { enemy: gunship, count: 2, formation: loop_left, spacing: 0.8, delay: 1.0 }
      - { enemy: fighter, count: 6, formation: dive_then_strafe, spacing: 0.3, delay: 1.5 }
      - { enemy: drone, count: 6, formation: figure_eight_centre, spacing: 0.25, delay: 2.0 }

  # Marauder squadron #2 — pre-boss "you've earned this" wall of three
  # mini-bosses. Kid playtest 2026-05-03 #10.
  - at: 184.0
    stage: 4
    spawn:
      - { enemy: marauder, count: 1, formation: marauder_entry, spacing: 0.0 }
      - { enemy: marauder, count: 1, formation: mirror(marauder_entry), spacing: 0.0, delay: 0.6 }
      - { enemy: marauder, count: 1, formation: marauder_entry, spacing: 0.0, delay: 1.2 }

  - at: 186.0
    stage: 4
    spawn:
      - { enemy: sentinel, count: 1, formation: sweep_horizontal, spacing: 0.0 }
      - { enemy: interceptor, count: 6, formation: pincer_top, spacing: 0.25, delay: 0.5 }
      - { enemy: kamikaze, count: 4, formation: kamikaze_dive_right, spacing: 0.4, delay: 1.0 }
      - { enemy: kamikaze, count: 4, formation: mirror(kamikaze_dive_right), spacing: 0.4, delay: 1.5 }
      - { enemy: bomber, count: 2, formation: slow_descent_centre, spacing: 1.2, delay: 2.0 }

  - at: 196.0
    stage: 4
    spawn:
      - { enemy: sentinel, count: 1, formation: sweep_horizontal, spacing: 0.0 }
      - { enemy: sentinel, count: 1, formation: mirror(sweep_horizontal), spacing: 0.0, delay: 0.8 }
      - { enemy: bomber, count: 3, formation: slow_descent_centre, spacing: 0.9, delay: 1.5 }
      - { enemy: interceptor, count: 5, formation: pincer_top, spacing: 0.25, delay: 2.0 }
      - { enemy: kamikaze, count: 3, formation: kamikaze_dive_right, spacing: 0.4, delay: 3.0 }

  # Surprise wave #3 of 3 — final-stage kamikazes from directly behind
  # the player. The boss-room before the boss.
  - at: 202.0
    stage: 4
    spawn:
      - { enemy: kamikaze, count: 4, formation: from_behind_centre, spacing: 0.4 }

  - at: 206.0
    stage: 4
    spawn:
      - { enemy: sentinel, count: 1, formation: sweep_horizontal, spacing: 0.0 }
      - { enemy: fighter, count: 6, formation: dive_then_strafe, spacing: 0.3, delay: 0.5 }
      - { enemy: fighter, count: 6, formation: mirror(dive_then_strafe), spacing: 0.3, delay: 0.9 }
      - { enemy: drone, count: 6, formation: figure_eight_centre, spacing: 0.25, delay: 1.5 }
      - { enemy: interceptor, count: 3, formation: pincer_top, spacing: 0.3, delay: 2.0 }

  # ───────── Boss ─────────
  # Pulled in 260 → 216 (was 10s after final wave; same here, but the
  # whole campaign now reaches the finale 44s sooner).
  - at: 216.0
    stage: boss
    boss: boss_05
