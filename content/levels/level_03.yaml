# Level 3 — "Tense Orbital"
# Per the multi-level arc spec: the pilots have crossed Earth's orbit
# and are now fighting through tightly-coordinated alien squadrons.
# Backdrop: standard parallax starfield (bg_starfield_01) — only two
# backdrops exist, so we reuse the starfield from level 2.
#
# Music: dedicated mid-fast and dissonant track (music/level_03.ogg,
# generated by tools/generate_music.py LEVEL_03 spec). Boss music gets
# its own tense cue at music/boss_03.ogg.
#
# Difficulty curve note: level 3 is the "interceptor introduction"
# beat. The new `interceptor` enemy (hp=2, fast, fires `rapid_aim` 4
# times per pass) is the headline threat — it is woven into every
# stage from wave 2 onwards. NO drone-only warm-up: the level opens
# with a fighter pair to keep the pressure on from the start (same
# discipline as level 2). Stages 2-3 layer interceptors over gunships
# / bombers / fighters so the kid learns to triage the rapid-fire
# threat first. Stage 4 is the pre-boss crescendo — dense walls and
# kamikaze-style interceptor swarms.
#
# Pacing: 225s in the brief (between level 1's 225 and a level-5 push
# of ~260) → length_seconds 235 to leave room for the crescendo +
# 5-second pre-boss settle. 18 wave events across 4 combat stages
# plus the boss wave — same density as level 2 but with the new
# interceptor pressure dialled in.

level: 3
title: "Tense Orbital"
codename: tense_orbital
music: music/level_03.ogg
boss_music: music/boss_03.ogg
background: bg_space_station
length_seconds: 235

waves:
  # Pacing pass kid playtest 2026-05-02 #8 — every authored gap ≤ 10s.
  # Stage 1 — interceptor introduction.
  - at: 2.0
    stage: 1
    spawn:
      - { enemy: fighter, count: 5, formation: arc_left_to_right, spacing: 0.4 }
      - { enemy: fighter, count: 5, formation: mirror(arc_left_to_right), spacing: 0.4, delay: 1.0 }

  - at: 11.0
    stage: 1
    spawn:
      - { enemy: interceptor, count: 4, formation: sweep_horizontal, spacing: 0.5 }

  - at: 20.0
    stage: 1
    spawn:
      - { enemy: interceptor, count: 4, formation: sweep_horizontal, spacing: 0.5 }
      - { enemy: fighter, count: 4, formation: arc_left_to_right, spacing: 0.4, delay: 1.5 }

  - at: 30.0
    stage: 1
    spawn:
      - { enemy: interceptor, count: 5, formation: pincer_top, spacing: 0.4, return_passes: 1 }
      - { enemy: interceptor, count: 5, formation: mirror(pincer_top), spacing: 0.4, delay: 0.6, return_passes: 1 }

  # Stage 2 — interceptor + gunship layers.
  - at: 40.0
    stage: 2
    spawn:
      - { enemy: gunship, count: 3, formation: loop_left, spacing: 0.8, return_passes: 1 }
      - { enemy: interceptor, count: 4, formation: sweep_horizontal, spacing: 0.5, delay: 1.0 }

  - at: 50.0
    stage: 2
    spawn:
      - { enemy: interceptor, count: 5, formation: arc_left_to_right, spacing: 0.35 }
      - { enemy: interceptor, count: 5, formation: mirror(arc_left_to_right), spacing: 0.35, delay: 0.6 }
      - { enemy: gunship, count: 2, formation: loop_left, spacing: 1.0, delay: 2.0 }

  - at: 60.0
    stage: 2
    spawn:
      - { enemy: bomber, count: 3, formation: slow_descent_centre, spacing: 1.0 }
      - { enemy: interceptor, count: 5, formation: kamikaze_dive_right, spacing: 0.4, delay: 1.5 }

  - at: 70.0
    stage: 2
    spawn:
      - { enemy: gunship, count: 3, formation: loop_left, spacing: 0.7 }
      - { enemy: gunship, count: 3, formation: mirror(loop_left), spacing: 0.7, delay: 0.5 }
      - { enemy: drone, count: 8, formation: figure_eight_centre, spacing: 0.25, delay: 1.5 }

  - at: 80.0
    stage: 2
    spawn:
      - { enemy: resupply_ship, count: 1, formation: resupply_cruise, spacing: 0.0 }

  # Stage 3 — full palette mix.
  - at: 88.0
    stage: 3
    spawn:
      - { enemy: interceptor, count: 5, formation: kamikaze_dive_right, spacing: 0.35 }
      - { enemy: interceptor, count: 5, formation: mirror(kamikaze_dive_right), spacing: 0.35, delay: 0.5 }
      - { enemy: drone, count: 6, formation: figure_eight_centre, spacing: 0.3, delay: 1.0 }

  - at: 98.0
    stage: 3
    spawn:
      - { enemy: bomber, count: 3, formation: slow_descent_centre, spacing: 1.0 }
      - { enemy: fighter, count: 5, formation: dive_then_strafe, spacing: 0.3, delay: 1.5 }
      - { enemy: fighter, count: 5, formation: mirror(dive_then_strafe), spacing: 0.3, delay: 2.0 }

  - at: 108.0
    stage: 3
    spawn:
      - { enemy: gunship, count: 2, formation: loop_left, spacing: 0.9 }
      - { enemy: gunship, count: 2, formation: mirror(loop_left), spacing: 0.9, delay: 0.5 }
      - { enemy: interceptor, count: 4, formation: sweep_horizontal, spacing: 0.5, delay: 1.5 }

  - at: 118.0
    stage: 3
    spawn:
      - { enemy: drone, count: 8, formation: figure_eight_centre, spacing: 0.2 }
      - { enemy: fighter, count: 6, formation: arc_left_to_right, spacing: 0.3, delay: 1.0 }
      - { enemy: gunship, count: 1, formation: loop_left, spacing: 0.0, delay: 2.5 }

  # Stage 4 — pre-boss crescendo.
  - at: 128.0
    stage: 4
    spawn:
      - { enemy: bomber, count: 4, formation: slow_descent_centre, spacing: 0.9 }
      - { enemy: gunship, count: 2, formation: mirror(loop_left), spacing: 0.9, delay: 1.0 }

  - at: 137.0
    stage: 4
    spawn:
      - { enemy: resupply_ship, count: 1, formation: resupply_cruise, spacing: 0.0 }

  - at: 145.0
    stage: 4
    spawn:
      - { enemy: interceptor, count: 5, formation: kamikaze_dive_right, spacing: 0.35 }
      - { enemy: interceptor, count: 5, formation: mirror(kamikaze_dive_right), spacing: 0.35, delay: 0.4 }
      - { enemy: interceptor, count: 4, formation: sweep_horizontal, spacing: 0.5, delay: 1.5 }

  - at: 155.0
    stage: 4
    spawn:
      - { enemy: fighter, count: 8, formation: dive_then_strafe, spacing: 0.22 }
      - { enemy: fighter, count: 8, formation: mirror(dive_then_strafe), spacing: 0.22, delay: 0.4 }

  - at: 165.0
    stage: 4
    spawn:
      - { enemy: gunship, count: 2, formation: loop_left, spacing: 0.8 }
      - { enemy: gunship, count: 2, formation: mirror(loop_left), spacing: 0.8, delay: 0.4 }
      - { enemy: interceptor, count: 4, formation: pincer_top, spacing: 0.4, delay: 1.0 }
      - { enemy: drone, count: 6, formation: figure_eight_centre, spacing: 0.25, delay: 1.5 }

  # ───────── Boss ─────────
  # Pulled in 230 → 175 (was 12s after final wave; now 10s).
  - at: 175.0
    stage: boss
    boss: boss_03
